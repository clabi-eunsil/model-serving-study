<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">KServe InferenceService 흐름</title>
  <desc id="desc">KServe InferenceService의 배포 준비 흐름과 배포 후 요청 처리 흐름을 분리해 보여주는 다이어그램</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .user { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
      .kserve { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .runtime { fill: #eaf7ff; stroke: #0284c7; stroke-width: 2; rx: 10; }
      .store { fill: #fff8eb; stroke: #d97706; stroke-width: 2; rx: 10; }
      .net { fill: #effaf0; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .optional { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 5; rx: 10; }
      .line { fill: none; stroke: #334155; stroke-width: 2.6; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .attach { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 6; }
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .section { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #334155; }
      .label { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
      .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
      .num { font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
      .badge { fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text x="52" y="52" class="title">Chapter 11 KServe InferenceService 흐름</text>
  <text x="52" y="82" class="small">A는 배포 준비 단계이고, B는 배포가 Ready 된 뒤의 요청 처리 단계다.</text>

  <rect x="36" y="112" width="1128" height="260" class="lane"/>
  <text x="62" y="146" class="section">A. 배포 준비 흐름: InferenceService 적용 후 KServe가 리소스를 준비한다</text>

  <rect x="76" y="190" width="210" height="96" class="user"/>
  <text x="104" y="224" class="label">YAML apply</text>
  <text x="104" y="252" class="small">InferenceService</text>
  <text x="104" y="274" class="tiny">predictor.model.storageUri</text>

  <rect x="362" y="190" width="220" height="96" class="kserve"/>
  <text x="390" y="224" class="label">KServe Control</text>
  <text x="390" y="252" class="small">CRD 상태 조정</text>
  <text x="390" y="274" class="tiny">원하는 상태를 실제 상태로</text>

  <rect x="664" y="190" width="210" height="96" class="runtime"/>
  <text x="692" y="224" class="label">ServingRuntime</text>
  <text x="692" y="252" class="small">sklearn 선택</text>
  <text x="692" y="274" class="tiny">built-in or custom</text>

  <rect x="954" y="190" width="190" height="96" class="runtime"/>
  <text x="988" y="224" class="label">Predictor Pod</text>
  <text x="988" y="252" class="small">model server 실행</text>
  <text x="988" y="274" class="tiny">/v1/models/...:predict</text>

  <path class="line" d="M286 238 H362"/>
  <path class="line" d="M582 238 H664"/>
  <path class="line" d="M874 238 H954"/>

  <circle cx="324" cy="238" r="14" class="badge"/><text x="319" y="243" class="num">1</text>
  <circle cx="623" cy="238" r="14" class="badge"/><text x="618" y="243" class="num">2</text>
  <circle cx="914" cy="238" r="14" class="badge"/><text x="909" y="243" class="num">3</text>

  <rect x="664" y="306" width="210" height="52" class="store"/>
  <text x="700" y="338" class="small">Model storage</text>
  <text x="700" y="354" class="tiny">gs://, s3://, pvc:// ...</text>
  <path class="attach" d="M769 306 V286"/>

  <rect x="36" y="400" width="1128" height="260" class="lane"/>
  <text x="62" y="434" class="section">B. 요청 처리 흐름: 배포 완료 후 client 요청이 predictor로 들어간다</text>

  <rect x="76" y="488" width="190" height="82" class="user"/>
  <text x="116" y="522" class="label">Client</text>
  <text x="116" y="548" class="tiny">curl / SDK</text>

  <rect x="356" y="488" width="210" height="82" class="net"/>
  <text x="394" y="522" class="label">Gateway</text>
  <text x="394" y="548" class="tiny">Istio / local gateway</text>

  <rect x="654" y="488" width="210" height="82" class="kserve"/>
  <text x="692" y="522" class="label">KServe route</text>
  <text x="692" y="548" class="tiny">Host header로 선택</text>

  <rect x="954" y="488" width="190" height="82" class="runtime"/>
  <text x="988" y="522" class="label">Predictor</text>
  <text x="988" y="548" class="tiny">prediction 반환</text>

  <path class="line" d="M266 529 H356"/>
  <path class="line" d="M566 529 H654"/>
  <path class="line" d="M864 529 H954"/>

  <circle cx="311" cy="529" r="14" class="badge"/><text x="306" y="534" class="num">4</text>
  <circle cx="610" cy="529" r="14" class="badge"/><text x="605" y="534" class="num">5</text>
  <circle cx="909" cy="529" r="14" class="badge"/><text x="904" y="534" class="num">6</text>

  <rect x="356" y="600" width="210" height="44" class="optional"/>
  <text x="394" y="620" class="tiny">Knative mode:</text>
  <text x="394" y="638" class="tiny">autoscaling / scale-to-zero</text>

  <rect x="52" y="696" width="1096" height="42" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4" rx="8"/>
  <text x="70" y="716" class="tiny">A: 1 InferenceService 선언, 2 controller 조정, 3 runtime/pod 준비.</text>
  <text x="70" y="734" class="tiny">B: 4 client 요청, 5 gateway/route, 6 predictor 응답. transformer/explainer는 predictor 앞뒤에 붙을 수 있다.</text>
</svg>
