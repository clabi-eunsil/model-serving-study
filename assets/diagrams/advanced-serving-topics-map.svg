<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840" role="img" aria-labelledby="title desc">
  <title id="title">Advanced LLM serving strategy map</title>
  <desc id="desc">Chapter 13의 고급 LLM 서빙 주제를 문제 상황, 검토할 기술, 확인 지표 순서로 정리한 표형 다이어그램</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,5 L0,10 Z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 8; }
      .header { fill: #eef2ff; stroke: #6677c8; stroke-width: 1.5; rx: 8; }
      .problem { fill: #e8f4ff; stroke: #5f92c8; stroke-width: 1.5; rx: 8; }
      .topic { fill: #fff7ed; stroke: #d28b28; stroke-width: 1.5; rx: 8; }
      .check { fill: #eaf7ee; stroke: #62a875; stroke-width: 1.5; rx: 8; }
      .quiet { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 1.2; rx: 8; }
      .line { fill: none; stroke: #475569; stroke-width: 2.3; marker-end: url(#arrow); }
      .title { font: 700 30px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .subtitle { font: 400 16px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .col-title { font: 700 15px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; text-anchor: middle; }
      .label { font: 700 17px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; text-anchor: middle; }
      .small { font: 400 13px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; text-anchor: middle; }
      .tiny { font: 400 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64748b; text-anchor: middle; }
      .badge { fill: #ffffff; stroke: #475569; stroke-width: 1.5; }
      .badge-text { font: 700 12px system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; text-anchor: middle; dominant-baseline: central; }
    </style>
  </defs>

  <rect class="bg" width="1440" height="840"/>
  <text class="title" x="56" y="58">Chapter 13 문제별 해결 전략</text>
  <text class="subtitle" x="56" y="88">문제가 생겼을 때 어떤 기술을 검토하고, 무엇을 확인할지 한 줄씩 읽는다.</text>

  <rect class="panel" x="44" y="122" width="1352" height="704"/>

  <rect class="header" x="76" y="154" width="360" height="54"/>
  <text class="col-title" x="256" y="187">문제 상황</text>

  <rect class="header" x="540" y="154" width="360" height="54"/>
  <text class="col-title" x="720" y="187">검토할 기술</text>

  <rect class="header" x="1004" y="154" width="360" height="54"/>
  <text class="col-title" x="1184" y="187">확인할 것</text>

  <rect class="problem" x="76" y="248" width="360" height="68"/>
  <text class="label" x="256" y="276">GPU memory가 부족하다</text>
  <text class="small" x="256" y="298">weight, KV cache가 먼저 압박된다</text>
  <path class="line" d="M436 282 H540"/>
  <circle class="badge" cx="488" cy="282" r="12"/><text class="badge-text" x="488" y="282">1</text>
  <rect class="topic" x="540" y="248" width="360" height="68"/>
  <text class="label" x="720" y="276">Quantization</text>
  <text class="small" x="720" y="298">AWQ, GPTQ, bitsandbytes</text>
  <path class="line" d="M900 282 H1004"/>
  <rect class="check" x="1004" y="248" width="360" height="68"/>
  <text class="label" x="1184" y="276">품질과 memory</text>
  <text class="small" x="1184" y="298">GPU 지원, license, accuracy</text>

  <rect class="problem" x="76" y="340" width="360" height="68"/>
  <text class="label" x="256" y="368">모델이 GPU 1장에 안 들어간다</text>
  <text class="small" x="256" y="390">단일 device 한계를 넘는다</text>
  <path class="line" d="M436 374 H540"/>
  <circle class="badge" cx="488" cy="374" r="12"/><text class="badge-text" x="488" y="374">2</text>
  <rect class="topic" x="540" y="340" width="360" height="68"/>
  <text class="label" x="720" y="368">Parallelism</text>
  <text class="small" x="720" y="390">tensor, pipeline parallelism</text>
  <path class="line" d="M900 374 H1004"/>
  <rect class="check" x="1004" y="340" width="360" height="68"/>
  <text class="label" x="1184" y="368">GPU 간 통신</text>
  <text class="small" x="1184" y="390">NVLink, node 수, utilization</text>

  <rect class="problem" x="76" y="432" width="360" height="68"/>
  <text class="label" x="256" y="460">token 생성이 느리다</text>
  <text class="small" x="256" y="482">decode 단계가 병목이 된다</text>
  <path class="line" d="M436 466 H540"/>
  <circle class="badge" cx="488" cy="466" r="12"/><text class="badge-text" x="488" y="466">3</text>
  <rect class="topic" x="540" y="432" width="360" height="68"/>
  <text class="label" x="720" y="460">Speculative decoding</text>
  <text class="small" x="720" y="482">draft model, verify step</text>
  <path class="line" d="M900 466 H1004"/>
  <rect class="check" x="1004" y="432" width="360" height="68"/>
  <text class="label" x="1184" y="460">inter-token latency</text>
  <text class="small" x="1184" y="482">acceptance rate, tokens/sec</text>

  <rect class="problem" x="76" y="524" width="360" height="68"/>
  <text class="label" x="256" y="552">task별 모델을 따로 띄우기 부담스럽다</text>
  <text class="small" x="256" y="574">base model이 반복 로딩된다</text>
  <path class="line" d="M436 558 H540"/>
  <circle class="badge" cx="488" cy="558" r="12"/><text class="badge-text" x="488" y="558">4</text>
  <rect class="topic" x="540" y="524" width="360" height="68"/>
  <text class="label" x="720" y="552">LoRA / multi-LoRA</text>
  <text class="small" x="720" y="574">base model + adapter</text>
  <path class="line" d="M900 558 H1004"/>
  <rect class="check" x="1004" y="524" width="360" height="68"/>
  <text class="label" x="1184" y="552">adapter 격리</text>
  <text class="small" x="1184" y="574">adapter별 품질, latency, 권한</text>

  <rect class="problem" x="76" y="616" width="360" height="68"/>
  <text class="label" x="256" y="644">같은 prompt가 반복된다</text>
  <text class="small" x="256" y="666">system prompt나 prefix가 길다</text>
  <path class="line" d="M436 650 H540"/>
  <circle class="badge" cx="488" cy="650" r="12"/><text class="badge-text" x="488" y="650">5</text>
  <rect class="topic" x="540" y="616" width="360" height="68"/>
  <text class="label" x="720" y="644">Prompt / response cache</text>
  <text class="small" x="720" y="666">계산 cache와 응답 cache 구분</text>
  <path class="line" d="M900 650 H1004"/>
  <rect class="check" x="1004" y="616" width="360" height="68"/>
  <text class="label" x="1184" y="644">cache hit와 안전성</text>
  <text class="small" x="1184" y="666">tenant, 권한, 개인정보 분리</text>

  <rect class="problem" x="76" y="708" width="360" height="68"/>
  <text class="label" x="256" y="736">특정 client가 endpoint를 독점한다</text>
  <text class="small" x="256" y="758">폭주와 남용을 막아야 한다</text>
  <path class="line" d="M436 742 H540"/>
  <circle class="badge" cx="488" cy="742" r="12"/><text class="badge-text" x="488" y="742">6</text>
  <rect class="topic" x="540" y="708" width="360" height="68"/>
  <text class="label" x="720" y="736">Traffic control</text>
  <text class="small" x="720" y="758">rate limit, API key, quota</text>
  <path class="line" d="M900 742 H1004"/>
  <rect class="check" x="1004" y="708" width="360" height="68"/>
  <text class="label" x="1184" y="736">보호할 자원</text>
  <text class="small" x="1184" y="758">GPU, queue, endpoint, tenant</text>
</svg>
