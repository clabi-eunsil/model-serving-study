<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920" role="img" aria-labelledby="title desc">
  <title id="title">LLM serving 고급 주제 관계도</title>
  <desc id="desc">LLM serving 요청 흐름과 챕터 13 고급 주제를 Memory, Latency, Operation 영역으로 나누어 보여주는 다이어그램</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .section { font: 700 20px Arial, sans-serif; fill: #111827; }
      .label { font: 700 15px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #475569; }
      .tiny { font: 12px Arial, sans-serif; fill: #64748b; }
      .frame { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.4; rx: 12; }
      .flow { fill: #eef2ff; stroke: #6366f1; stroke-width: 1.4; rx: 10; }
      .memory { fill: #fff7ed; stroke: #ea580c; stroke-width: 1.4; rx: 10; }
      .latency { fill: #fef9c3; stroke: #ca8a04; stroke-width: 1.4; rx: 10; }
      .ops { fill: #ecfdf5; stroke: #059669; stroke-width: 1.4; rx: 10; }
      .guard { fill: #fce7f3; stroke: #db2777; stroke-width: 1.4; rx: 10; }
      .line { stroke: #475569; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .hint { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrow); }
      .legend { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.2; rx: 10; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="920"/>
  <text class="title" x="58" y="54">챕터 13 고급 주제는 요청 흐름의 서로 다른 지점을 조정한다</text>
  <text class="subtitle" x="58" y="84">위쪽은 기본 LLM serving 흐름이고, 아래쪽은 어떤 문제를 어느 영역에서 다루는지 나눈 것이다.</text>

  <rect class="frame" x="44" y="116" width="1412" height="760"/>

  <!-- Flow row -->
  <text class="section" x="78" y="158">기본 요청 흐름</text>

  <rect class="flow" x="78" y="184" width="210" height="74"/>
  <text class="label" x="103" y="215">1. client 요청</text>
  <text class="small" x="103" y="239">user, service, tenant</text>

  <path class="line" d="M 288 221 H 340"/>

  <rect class="flow" x="340" y="184" width="210" height="74"/>
  <text class="label" x="365" y="215">2. gateway</text>
  <text class="small" x="365" y="239">인증, 제한, routing</text>

  <path class="line" d="M 550 221 H 602"/>

  <rect class="flow" x="602" y="184" width="210" height="74"/>
  <text class="label" x="627" y="215">3. serving engine</text>
  <text class="small" x="627" y="239">vLLM, NIM, runtime</text>

  <path class="line" d="M 812 221 H 864"/>

  <rect class="flow" x="864" y="184" width="210" height="74"/>
  <text class="label" x="889" y="215">4. prefill</text>
  <text class="small" x="889" y="239">prompt 처리, KV 생성</text>

  <path class="line" d="M 1074 221 H 1126"/>

  <rect class="flow" x="1126" y="184" width="210" height="74"/>
  <text class="label" x="1151" y="215">5. decode/response</text>
  <text class="small" x="1151" y="239">token 생성, 응답 반환</text>

  <!-- Memory panel -->
  <rect class="frame" x="78" y="330" width="400" height="390"/>
  <text class="section" x="108" y="370">A. Memory / Capacity</text>
  <text class="small" x="108" y="396">GPU memory와 모델 크기 문제</text>

  <rect class="memory" x="108" y="426" width="340" height="72"/>
  <text class="label" x="132" y="455">GPU memory가 부족하다</text>
  <text class="small" x="132" y="479">quantization, 작은 model, KV cache 제한</text>

  <rect class="memory" x="108" y="522" width="340" height="72"/>
  <text class="label" x="132" y="551">모델이 GPU 1장에 안 들어간다</text>
  <text class="small" x="132" y="575">tensor parallelism, pipeline parallelism</text>

  <rect class="memory" x="108" y="618" width="340" height="72"/>
  <text class="label" x="132" y="647">먼저 볼 것</text>
  <text class="small" x="132" y="671">nvidia-smi, OOM log, GPU 수, node topology</text>

  <!-- Latency panel -->
  <rect class="frame" x="550" y="330" width="400" height="390"/>
  <text class="section" x="580" y="370">B. Latency / Repeated Work</text>
  <text class="small" x="580" y="396">prefill, decode, cache 문제</text>

  <rect class="latency" x="580" y="426" width="340" height="64"/>
  <text class="label" x="604" y="452">token 생성이 느리다</text>
  <text class="small" x="604" y="474">speculative decoding, batching, quantization</text>

  <rect class="latency" x="580" y="506" width="340" height="64"/>
  <text class="label" x="604" y="532">같은 system prompt가 반복된다</text>
  <text class="small" x="604" y="554">prompt/prefix cache</text>

  <rect class="latency" x="580" y="586" width="340" height="64"/>
  <text class="label" x="604" y="612">같은 질문과 답변이 반복된다</text>
  <text class="small" x="604" y="634">response cache</text>

  <rect class="latency" x="580" y="666" width="340" height="36"/>
  <text class="small" x="604" y="689">볼 것: TTFT, inter-token latency, cache hit</text>

  <!-- Operations panel -->
  <rect class="frame" x="1022" y="330" width="400" height="390"/>
  <text class="section" x="1052" y="370">C. Operation / Sharing</text>
  <text class="small" x="1052" y="396">여러 사용자, 여러 task, 외부 공개 문제</text>

  <rect class="ops" x="1052" y="426" width="340" height="64"/>
  <text class="label" x="1076" y="452">task별로 모델을 따로 띄우기 부담</text>
  <text class="small" x="1076" y="474">LoRA, multi-LoRA serving</text>

  <rect class="guard" x="1052" y="506" width="340" height="64"/>
  <text class="label" x="1076" y="532">특정 사용자/서비스가 독점한다</text>
  <text class="small" x="1076" y="554">rate limiting, quota, tenant isolation</text>

  <rect class="guard" x="1052" y="586" width="340" height="64"/>
  <text class="label" x="1076" y="612">endpoint를 외부에 열어야 한다</text>
  <text class="small" x="1076" y="634">API key, auth gateway, audit log</text>

  <rect class="guard" x="1052" y="666" width="340" height="36"/>
  <text class="small" x="1076" y="689">볼 것: tenant별 token usage, 권한, 호출 이력</text>

  <!-- Loose hints from flow to panels. These are not one-to-one execution edges. -->
  <path class="hint" d="M 707 258 V 298 H 278 V 324"/>
  <path class="hint" d="M 969 258 V 298 H 750 V 324"/>
  <path class="hint" d="M 445 258 V 298 H 1222 V 324"/>

  <!-- Reading note -->
  <rect class="legend" x="78" y="770" width="1260" height="70"/>
  <text class="small" x="104" y="798">읽는 법: A/B/C는 실행 순서가 아니라 관찰 관점이다. 기본 요청 흐름의 2, 3, 4, 5번 어디서든 여러 문제가 동시에 생길 수 있다.</text>
  <text class="small" x="104" y="824">점선 화살표는 "이 단계에서 주로 떠올릴 수 있는 조정 영역"을 느슨하게 연결한 것이며, 1:1 매핑을 뜻하지 않는다.</text>
</svg>
