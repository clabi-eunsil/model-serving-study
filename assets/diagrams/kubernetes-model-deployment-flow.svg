<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">Kubernetes 모델 서버 배포 흐름</title>
  <desc id="desc">배포 생성 흐름과 요청 호출 흐름을 분리해 보여주는 Kubernetes 모델 서버 다이어그램</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .lane { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .cluster { fill: #ffffff; stroke: #64748b; stroke-width: 2; rx: 14; }
      .dev { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2; rx: 10; }
      .k8s { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .pod { fill: #eaf7ff; stroke: #0284c7; stroke-width: 2.5; rx: 10; }
      .store { fill: #fff8eb; stroke: #d97706; stroke-width: 2; rx: 10; }
      .gpu { fill: #effaf0; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .optional { fill: #f8fafc; stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 8 5; rx: 10; }
      .line { fill: none; stroke: #334155; stroke-width: 2.6; marker-end: url(#arrow); }
      .dash { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 8 6; marker-end: url(#arrow); }
      .attach { fill: none; stroke: #64748b; stroke-width: 2.2; stroke-dasharray: 7 6; }
      .title { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #0f172a; }
      .section { font-family: Arial, sans-serif; font-size: 17px; font-weight: 700; fill: #334155; }
      .label { font-family: Arial, sans-serif; font-size: 18px; font-weight: 700; fill: #0f172a; }
      .small { font-family: Arial, sans-serif; font-size: 15px; fill: #334155; }
      .tiny { font-family: Arial, sans-serif; font-size: 13px; fill: #475569; }
      .num { font-family: Arial, sans-serif; font-size: 14px; font-weight: 700; fill: #ffffff; }
      .badge { fill: #334155; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="760"/>
  <text x="52" y="52" class="title">Chapter 10 Kubernetes 모델 서버 배포 흐름</text>
  <text x="52" y="82" class="small">위쪽은 Kubernetes가 Pod를 만드는 흐름, 아래쪽은 client 요청이 모델 서버로 들어가는 흐름이다.</text>

  <rect x="36" y="112" width="1128" height="252" class="lane"/>
  <text x="62" y="146" class="section">A. 배포 생성 흐름</text>

  <rect x="76" y="188" width="210" height="96" class="dev"/>
  <text x="104" y="224" class="label">Docker image</text>
  <text x="104" y="252" class="small">FastAPI model server</text>
  <text x="104" y="274" class="tiny">model-serving-fastapi:chapter-10</text>

  <rect x="362" y="188" width="210" height="96" class="k8s"/>
  <text x="390" y="224" class="label">Deployment</text>
  <text x="390" y="252" class="small">Pod template 선언</text>
  <text x="390" y="274" class="tiny">replica, probe, resource</text>

  <rect x="648" y="188" width="210" height="96" class="k8s"/>
  <text x="676" y="224" class="label">ReplicaSet</text>
  <text x="676" y="252" class="small">Pod 개수 유지</text>
  <text x="676" y="274" class="tiny">Deployment가 생성</text>

  <rect x="934" y="188" width="190" height="96" class="pod"/>
  <text x="972" y="224" class="label">Pod</text>
  <text x="972" y="252" class="small">container 실행</text>
  <text x="972" y="274" class="tiny">/health, /generate</text>

  <path class="line" d="M286 236 H362"/>
  <path class="line" d="M572 236 H648"/>
  <path class="line" d="M858 236 H934"/>

  <circle cx="324" cy="236" r="14" class="badge"/><text x="319" y="241" class="num">1</text>
  <circle cx="610" cy="236" r="14" class="badge"/><text x="605" y="241" class="num">2</text>
  <circle cx="896" cy="236" r="14" class="badge"/><text x="891" y="241" class="num">3</text>

  <rect x="36" y="392" width="1128" height="308" class="cluster"/>
  <text x="62" y="426" class="section">B. 요청 호출 흐름과 Pod에 붙는 조건</text>

  <rect x="76" y="480" width="190" height="82" class="dev"/>
  <text x="116" y="516" class="label">Client</text>
  <text x="116" y="544" class="small">curl / Python</text>

  <rect x="344" y="480" width="190" height="82" class="optional"/>
  <text x="386" y="516" class="label">Ingress</text>
  <text x="386" y="544" class="tiny">선택: controller 필요</text>

  <rect x="612" y="480" width="190" height="82" class="k8s"/>
  <text x="650" y="516" class="label">Service</text>
  <text x="650" y="544" class="tiny">안정적인 endpoint</text>

  <rect x="934" y="480" width="190" height="82" class="pod"/>
  <text x="972" y="516" class="label">Pod</text>
  <text x="972" y="544" class="tiny">실제 모델 서버</text>

  <path class="dash" d="M266 500 H344"/>
  <path class="dash" d="M534 500 H612"/>
  <path class="line" d="M171 562 V590 H707 V562"/>
  <path class="line" d="M802 521 H934"/>

  <circle cx="305" cy="500" r="14" class="badge"/><text x="300" y="505" class="num">4</text>
  <circle cx="573" cy="500" r="14" class="badge"/><text x="568" y="505" class="num">5</text>
  <circle cx="439" cy="590" r="14" class="badge"/><text x="434" y="595" class="num">6</text>
  <circle cx="868" cy="521" r="14" class="badge"/><text x="863" y="526" class="num">7</text>

  <rect x="612" y="610" width="190" height="78" class="store"/>
  <text x="650" y="642" class="label">PVC</text>
  <text x="650" y="668" class="tiny">model cache mount</text>

  <rect x="934" y="610" width="190" height="78" class="gpu"/>
  <text x="962" y="642" class="label">GPU 조건</text>
  <text x="962" y="668" class="tiny">device plugin + request</text>

  <path class="attach" d="M707 610 V562"/>
  <path class="attach" d="M1029 610 V562"/>

  <rect x="52" y="716" width="1096" height="34" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4" rx="8"/>
  <text x="70" y="738" class="tiny">4-5 Ingress는 선택 경로, 6 port-forward는 Ingress 없이 Service로 직접 연결, 7 Service가 ready Pod로 요청 전달. PVC와 GPU 조건은 Pod에 붙는 설정이며 호출 경로가 아니다.</text>
</svg>
