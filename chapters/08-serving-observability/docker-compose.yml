services:
  prometheus:
    # Prometheus는 model server의 /metrics/ endpoint를 주기적으로 가져와서
    # time series database처럼 저장하는 역할을 한다.
    #
    # 이 container 안에는 FastAPI app이 들어있지 않다.
    # FastAPI server는 host의 .venv에서 따로 실행하고,
    # Prometheus container가 host에 떠 있는 FastAPI server를 scrape한다.
    image: prom/prometheus:v3.5.0
    container_name: model-serving-prometheus
    ports:
      # host의 9090 포트를 container의 9090 포트에 연결한다.
      # 브라우저에서 http://127.0.0.1:9090 으로 Prometheus UI에 들어갈 수 있다.
      - "9090:9090"
    extra_hosts:
      # Docker container 안에서 host machine을 가리키는 이름을 만든다.
      #
      # 이 챕터에서는 FastAPI model server를 host process로 실행한다.
      # Prometheus는 container 안에서 실행되므로 127.0.0.1:8000을 보면
      # "container 자기 자신"을 보게 된다.
      #
      # 그래서 prometheus.yml에서는 host.docker.internal:8000을 target으로 둔다.
      # Docker Desktop에서는 보통 기본 제공되고, Linux Docker에서는 이 host-gateway
      # 설정이 필요할 수 있다.
      - "host.docker.internal:host-gateway"
    volumes:
      # Prometheus 설정 파일을 container 안의 표준 위치에 read-only로 mount한다.
      # 왼쪽은 내 작업 디렉터리의 파일, 오른쪽은 container 내부 경로다.
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      # Prometheus가 위에서 mount한 설정 파일을 사용하도록 지정한다.
      - "--config.file=/etc/prometheus/prometheus.yml"

  grafana:
    # Grafana는 metric을 직접 저장하지 않는다.
    # Prometheus를 datasource로 등록한 뒤 PromQL query 결과를 dashboard로 보여준다.
    image: grafana/grafana:12.0.2
    container_name: model-serving-grafana
    ports:
      # 브라우저에서 http://127.0.0.1:3000 으로 Grafana UI에 들어간다.
      - "3000:3000"
    environment:
      # 실습용 기본 로그인이다. 운영 환경에서는 절대 이런 식으로 두지 않는다.
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      # provisioning 디렉터리를 mount하면 Grafana UI에서 수동으로 datasource/dashboard를
      # 만들지 않아도 시작 시 자동 등록된다.
      #
      # datasource 설정:
      #   monitoring/grafana/provisioning/datasources/prometheus.yml
      #
      # dashboard provider 설정:
      #   monitoring/grafana/provisioning/dashboards/dashboards.yml
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      # 실제 dashboard JSON 파일들이 들어 있는 디렉터리다.
      # Grafana는 위 dashboard provider 설정을 통해 이 경로를 읽는다.
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      # Grafana가 Prometheus보다 먼저 떠도 결국 재시도할 수 있지만,
      # 실습에서는 읽기 쉽게 Prometheus를 먼저 시작하도록 둔다.
      - prometheus

  dcgm-exporter:
    # DCGM exporter는 NVIDIA GPU 상태를 Prometheus metric으로 노출한다.
    #
    # 로컬 PC에 NVIDIA GPU/Docker GPU runtime이 없다면 이 service는 실행하지 않는다.
    # 그래서 profiles: ["gpu"]를 붙여 기본 docker compose up에서는 빠지게 했다.
    #
    # 실행할 때:
    #   docker compose --profile gpu up -d dcgm-exporter
    image: ${DCGM_EXPORTER_IMAGE:-nvcr.io/nvidia/k8s/dcgm-exporter:2.1.4-2.3.1-ubuntu20.04}
    container_name: model-serving-dcgm-exporter
    profiles:
      - gpu
    ports:
      # Prometheus가 scrape할 DCGM exporter endpoint다.
      # 사람이 직접 확인할 때는 http://127.0.0.1:9400/metrics 를 본다.
      - "9400:9400"
    deploy:
      resources:
        reservations:
          devices:
            # container가 host의 NVIDIA GPU에 접근할 수 있게 요청한다.
            # Docker Desktop/일반 Docker에서 GPU runtime 설정이 되어 있어야 동작한다.
            - driver: nvidia
              count: all
              capabilities: [gpu]
    cap_add:
      # DCGM exporter가 일부 GPU telemetry를 읽을 때 필요한 capability다.
      # 운영 환경에서는 보안 정책에 맞게 최소 권한으로 조정해야 한다.
      - SYS_ADMIN
    command:
      # 어떤 GPU metric을 export할지 정한 CSV 파일을 사용한다.
      # image 안에 포함된 기본 metric 목록이다.
      - "-f"
      - "/etc/dcgm-exporter/dcp-metrics-included.csv"
