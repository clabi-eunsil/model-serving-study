# Chapter 13 rate limiting example for an OpenAI-compatible model server.
#
# This file is intentionally small and heavily commented.
# It assumes that a vLLM/NIM/FastAPI-compatible server is reachable as:
#   http://host.docker.internal:8000
#
# The important idea is:
# - the model server should focus on inference
# - traffic policy such as rate limiting and simple auth is often placed at
#   an edge proxy, API gateway, ingress controller, or service mesh.

events {}

http {
    # limit_req_zone defines a shared memory zone for request counters.
    # $binary_remote_addr means "count requests per client IP".
    # rate=5r/m means "allow about 5 requests per minute per IP".
    #
    # In production, IP may be a poor key behind NAT or a shared proxy.
    # For real multi-tenant API, use API key / user / org identity instead.
    limit_req_zone $binary_remote_addr zone=per_ip_chat:10m rate=5r/m;

    server {
        listen 8080;

        location / {
            # Apply the rate limit.
            # burst=2 allows a short spike of 2 extra requests.
            # nodelay means excessive requests in the burst are handled
            # immediately instead of being artificially delayed.
            limit_req zone=per_ip_chat burst=2 nodelay;

            # A tiny teaching-only API key check.
            # In production, prefer a proper API gateway, auth service,
            # ingress auth, OAuth/JWT validation, or service mesh policy.
            if ($http_authorization != "Bearer chapter13-demo-key") {
                return 401 "missing or invalid demo API key\n";
            }

            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_pass http://host.docker.internal:8000;
        }
    }
}
