# 이 파일은 바로 적용하는 production manifest가 아니라 custom runtime 구조를 읽기 위한 예시다.
# 실제로 사용하려면 아래 image를 사내 registry나 직접 build한 vLLM image로 바꾸고,
# readiness/liveness probe, resource, command/args를 환경에 맞게 검증해야 한다.
#
# KServe custom runtime의 핵심은 "이 modelFormat을 만나면 이 container image로 serving하라"를
# ServingRuntime 또는 ClusterServingRuntime으로 정의하는 것이다.
apiVersion: serving.kserve.io/v1alpha1
kind: ServingRuntime
metadata:
  # namespace-scoped runtime이다. 이 runtime은 kserve-llm namespace 안에서만 찾을 수 있다.
  name: custom-vllm-runtime
  namespace: kserve-llm
spec:
  # 이 runtime이 어떤 modelFormat을 지원하는지 KServe controller에게 알려준다.
  # autoSelect를 false로 두면 InferenceService에서 runtime: custom-vllm-runtime을
  # 명시했을 때만 사용된다. 처음 실습에서는 자동 선택보다 명시적 선택이 안전하다.
  supportedModelFormats:
    - name: huggingface
      version: "1"
      autoSelect: false

  containers:
    - name: kserve-container
      # 예시 image다. 실제 환경에서는 검증된 vLLM image로 바꿔야 한다.
      # 예: 사내 registry의 vllm-openai image 또는 직접 build한 image
      image: vllm/vllm-openai:latest

      # vLLM OpenAI-compatible server를 직접 실행하는 예시다.
      # /mnt/models는 KServe storage helper가 model artifact를 준비하는 기본 mount 위치로 자주 사용된다.
      # --served-model-name은 client가 요청 JSON의 "model" field에 넣을 이름이다.
      args:
        - --model=/mnt/models
        - --served-model-name={{.Name}}
        - --host=0.0.0.0
        - --port=8080

      # KServe가 container의 HTTP port를 알아야 route를 연결할 수 있다.
      ports:
        - containerPort: 8080
          protocol: TCP

      # LLM runtime은 GPU와 memory 요구량이 크다.
      # 실제 값은 모델 크기, quantization, max model length에 따라 달라진다.
      resources:
        requests:
          cpu: "1"
          memory: 8Gi
          nvidia.com/gpu: "1"
        limits:
          cpu: "4"
          memory: 16Gi
          nvidia.com/gpu: "1"
