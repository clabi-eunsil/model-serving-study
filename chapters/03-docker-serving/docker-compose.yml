# Docker Compose는 docker run 옵션을 YAML로 기록해 반복 실행하기 쉽게 해준다.
# 여기서는 model-server와 model-client를 같은 Compose network에서 실행해 본다.

services:
  model-server:
    # docker build -t model-serving-fastapi:chapter-03 . 에 해당한다.
    # 현재 디렉터리의 Dockerfile로 image를 build한다.
    build:
      context: .
      dockerfile: Dockerfile

    # docker build -t 에서 지정하던 image 이름이다.
    image: model-serving-fastapi:chapter-03

    # docker run --name model-serving-fastapi 에 해당한다.
    # container 이름을 고정하면 docker logs/stop에서 찾기 쉽다.
    container_name: model-serving-fastapi

    # docker run -p 8000:8000 에 해당한다.
    # host 8000 port를 container 8000 port로 연결한다.
    ports:
      - "8000:8000"

    # docker run -v hf-cache:/root/.cache/huggingface 에 해당한다.
    # Hugging Face cache를 Docker named volume에 저장한다.
    # 처음 모델 다운로드 후 container를 다시 만들어도 cache를 재사용할 수 있다.
    volumes:
      - hf-cache:/root/.cache/huggingface

    # docker run -e MODEL_NAME=sshleifer/tiny-gpt2 에 해당한다.
    # app/main.py는 MODEL_NAME 환경변수를 읽어 사용할 모델을 정한다.
    # 실습 기본값은 빠르게 실행되는 tiny-gpt2다.
    environment:
      MODEL_NAME: sshleifer/tiny-gpt2

    # container가 비정상 종료되면 다시 시작한다.
    # 실습에서는 필수는 아니지만 운영 설정의 감각을 보기 위해 넣는다.
    restart: unless-stopped

  model-client:
    # server와 같은 image를 사용하되, 실행 command만 client script로 바꾼다.
    # 이렇게 하면 server/client가 같은 dependency 환경을 공유한다.
    image: model-serving-fastapi:chapter-03
    build:
      context: .
      dockerfile: Dockerfile

    # client는 필요할 때만 실행하는 1회성 container다.
    # docker compose --profile client run --rm model-client 로 실행한다.
    profiles:
      - client

    # model-server가 먼저 생성되도록 순서를 지정한다.
    # 모델 로딩 완료까지 기다리는 것은 client/request.py의 retry loop가 담당한다.
    depends_on:
      - model-server

    # Compose 내부에서는 service 이름으로 통신할 수 있다.
    # host의 127.0.0.1이 아니라 model-server:8000을 사용한다.
    environment:
      MODEL_SERVER_URL: http://model-server:8000

    command: ["python", "client/request.py"]

volumes:
  hf-cache:
