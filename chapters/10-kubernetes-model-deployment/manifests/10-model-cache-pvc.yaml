# PersistentVolumeClaim(PVC)은 Pod가 사용할 영구 저장공간을 요청하는 object다.
# 실제 disk를 직접 만드는 것이 아니라, cluster의 StorageClass/provisioner에게
# "이 정도 크기의 volume을 주세요"라고 요청한다고 생각하면 된다.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  # Deployment에서 claimName으로 참조할 이름이다.
  name: model-cache-pvc
  # Namespace가 다르면 같은 이름의 PVC라도 다른 object다.
  namespace: model-serving
spec:
  # ReadWriteOnce는 보통 하나의 node에서 read/write로 mount할 수 있다는 뜻이다.
  # 단일 replica 실습이나 한 node의 model cache에는 충분하다.
  # 여러 node/replica가 같은 cache를 공유해야 한다면 ReadWriteMany 지원 storage를 검토한다.
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      # tiny-gpt2 실습에는 훨씬 작아도 되지만,
      # 모델 cache라는 개념을 보기 위해 넉넉하게 10Gi를 요청한다.
      storage: 10Gi
